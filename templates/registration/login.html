{% extends 'base.html' %}

{% block title %}Login — BarakahOS{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Login</h2>

    <form method="post" class="auth-form">
        {% csrf_token %}

        {% if form.errors %}
            <p class="auth-error">Invalid username or password. Please try again.</p>
        {% endif %}

        <div class="form-group">
            <label for="id_username">Username</label>
            <input
                type="text"
                name="username"
                id="id_username"
                required
                autofocus
                class="form-input"
            >
        </div>

        <div class="form-group">
            <label for="id_password">Password</label>
            <input
                type="password"
                name="password"
                id="id_password"
                required
                class="form-input"
            >
        </div>

        <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <p class="auth-switch">
        Don't have an account? <a href="{% url 'core:register' %}">Register here</a>
    </p>
</div>
{% endblock %}
