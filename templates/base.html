{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Deen & Discipline OS{% endblock %}</title>

    <!-- Global stylesheet -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ===== NAVIGATION ===== -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="{% url 'core:home' %}" class="nav-brand">Deen &amp; Discipline OS</a>
        </div>
    </nav>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
        {% block content %}
        {# Child templates fill this block #}
        {% endblock %}
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
        <p>&copy; Deen &amp; Discipline OS</p>
    </footer>

    {% block extra_js %}{% endblock %}

</body>
</html>
